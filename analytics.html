
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Analytics | Coderoller</title>
  <link rel="stylesheet" href="/src/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 flex font-sans">
  
<div class="w-72 bg-gray-950 border-r border-gray-900 hidden md:flex flex-col flex-shrink-0 min-h-screen">
  <div class="p-6 border-b border-gray-900">
    <p class="font-bold text-white">Jane Doe</p>
  </div>
  <div class="p-4 flex-grow">
    <ul class="space-y-2 mb-8">
      <li><a href="/dashboard.html" class="block px-4 py-3 text-gray-400 hover:text-white">Overview</a></li>
      <li><a href="/analytics.html" class="block px-4 py-3 text-gray-400 hover:text-white">Deep Analytics</a></li>
    </ul>
    <ul class="space-y-2">
      <li><a href="/profile.html" class="block px-4 py-3 text-gray-400 hover:text-white">My Profile</a></li>
      <li><a href="/settings.html" class="block px-4 py-3 text-gray-400 hover:text-white">Settings</a></li>
    </ul>
  </div>
</div>

  <div class="flex-grow p-8 max-w-7xl mx-auto h-screen overflow-y-auto">
    <h1 class="text-3xl font-black text-white mb-2">Deep Analytics</h1>
    <p id="math-check" class="text-gray-500 mb-10"></p>
    
    <div class="bg-gray-900 rounded-2xl p-8 mb-8" style="height: 400px; width: 100%;">
      <canvas id="myChart"></canvas>
    </div>
  </div>
  <script>
    // Extreme: Floating point math error in JS
    const checkProgress = 0.1 + 0.2 === 0.3;
    document.getElementById('math-check').innerText = "Float Check: " + checkProgress;
    
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{ label: 'Hours', data: [4.2, 5.1, 3.8, 7.5, 6.2, 2.1, 1.0], backgroundColor: '#22c55e' }]
      }
    });
  </script>
</body>
</html>
